# Smart Energy Backend - Application Configuration Example
# Copy this file to application.yml and update with your settings

spring:
  application:
    name: smart-energy-backend
  config:
    import: optional:file:.env[.properties]

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      # Options: validate, update, create, create-drop
      # Production: validate
      # Development: update
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 10
          fetch_size: 50
        order_inserts: true
        order_updates: true

  # Database Configuration
  datasource:
    # Local MySQL
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_energy_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    
    # Connection pooling (HikariCP - already included in Spring Boot)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Email Configuration (Gmail)
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${EMAIL_USER}
    password: ${EMAIL_PASS}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        debug: false

# JWT Configuration
jwt:
  # IMPORTANT: Change this to a strong, random secret at least 256 bits
  # Generate with: openssl rand -base64 32
  secret: ${JWT_SECRET}
  
  # Token expiration in milliseconds
  # 86400000 = 24 hours
  # 3600000 = 1 hour
  # 604800000 = 7 days
  expiration: ${JWT_EXPIRATION:86400000}

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api
    session:
      timeout: 30m
  error:
    include-message: always
    include-binding-errors: always

# Logging Configuration
logging:
  level:
    root: INFO
    com.smartenergy: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/smart-energy.log
    max-size: 10MB
    max-history: 10

# Jackson Configuration (JSON serialization)
spring:
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

# Application-specific configuration
app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:3001"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
    allowed-headers: "*"
    exposed-headers: "Authorization,Content-Disposition"
    allow-credentials: true
    max-age: 3600
  
  security:
    jwt:
      # OTP expiry in minutes
      otp-expiry-minutes: 5
      # Refresh token (optional)
      refresh-expiration: 604800000  # 7 days
  
  email:
    # Sender email address
    from: ${EMAIL_FROM:noreply@smartenergy.com}
    # Sender name
    from-name: "Smart Energy"

---

# PRODUCTION Profile Configuration
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate  # NEVER use update in production
    show-sql: false

  datasource:
    # Use environment variables in production
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  mail:
    username: ${EMAIL_USER}
    password: ${EMAIL_PASS}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: WARN
    com.smartenergy: INFO

---

# DEVELOPMENT Profile Configuration
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: update  # Auto-update schema
    show-sql: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_energy_db_dev?useSSL=false&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  mail:
    username: ${EMAIL_USER}
    password: ${EMAIL_PASS}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: INFO
    com.smartenergy: DEBUG
    org.springframework.security: DEBUG

---

# TEST Profile Configuration
spring:
  config:
    activate:
      on-profile: test

  datasource:
    # H2 in-memory database for testing
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

jwt:
  secret: ${JWT_SECRET:test-secret-key-for-local-tests-only}
  expiration: 3600000

logging:
  level:
    root: WARN
    com.smartenergy: DEBUG
